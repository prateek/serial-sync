[runtime]
log_level = "info"
log_format = "text"
store_driver = "sqlite"
store_dsn = "./state/state.db"
artifact_root = "./state/artifacts"
support_root = "./state/support"

[[auth_profiles]]
id = "patreon-default"
provider = "patreon"
mode = "fixture"
session_path = "./state/sessions/patreon-default.json"

[[publishers]]
id = "local-files"
kind = "filesystem"
path = "./publish"
enabled = true

[[sources]]
id = "plum-parrot"
provider = "patreon"
url = "https://www.patreon.com/c/PlumParrot/posts"
auth_profile = "patreon-default"
fixture_dir = "./testdata/fixtures/patreon/plum-parrot"
enabled = true

[[sources]]
id = "actus"
provider = "patreon"
url = "https://www.patreon.com/c/Actus/posts"
auth_profile = "patreon-default"
fixture_dir = "./testdata/fixtures/patreon/actus"
enabled = true

[[series]]
id = "andy-again-3"
title = "Andy, Again 3"
authors = ["Plum Parrot"]

  [series.output]
  format = "preserve"
  preface_mode = "prepend_post"

  [[series.inputs]]
  source = "plum-parrot"
  priority = 10
  match_type = "tag"
  match_value = "AA3"
  release_role = "chapter"
  content_strategy = "attachment_preferred"
  attachment_glob = ["*.epub", "*.pdf"]
  attachment_priority = ["epub", "pdf"]

[[series]]
id = "aura-overload-2"
title = "Aura Overload 2"
authors = ["Plum Parrot"]

  [series.output]
  format = "preserve"
  preface_mode = "none"

  [[series.inputs]]
  source = "plum-parrot"
  priority = 20
  match_type = "tag"
  match_value = "AO2"
  release_role = "chapter"
  content_strategy = "attachment_preferred"
  attachment_glob = ["*.pdf"]
  attachment_priority = ["pdf"]

[[series]]
id = "nightmare-realm-summoner"
title = "Nightmare Realm Summoner"
authors = ["Actus"]

  [series.output]
  format = "epub"
  preface_mode = "none"

  [[series.inputs]]
  source = "actus"
  priority = 10
  match_type = "title_regex"
  match_value = "^Nightmare Realm Summoner\\s+-\\s+Chapter\\s+"
  release_role = "chapter"
  content_strategy = "text_post"
